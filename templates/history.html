<!DOCTYPE html>
<html>
<head>
    <title>Transaction History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Transaction History</h1>

    <div class="form-center">
        <button onclick="goBack()">⬅ Back to Orders</button>
    </div>

    <ul id="historyList"></ul>
</div>

<script>

// =====================
// XML PARSER
// =====================
function parseXML(text) {
    return new DOMParser().parseFromString(text, "text/xml");
}

// =====================
// LOAD HISTORY
// =====================
function loadHistory() {
    fetch('/history')
    .then(res => res.text())
    .then(text => {
        const xml = parseXML(text);
        const items = xml.getElementsByTagName("item");

        const list = document.getElementById("historyList");
        list.innerHTML = "";

        for (let i = items.length - 1; i >= 0; i--) {
            const o = items[i];

            const li = document.createElement("li");

            li.innerHTML = `
                <strong>Order #${o.getElementsByTagName("id")[0]?.textContent}</strong><br>
                Customer: ${o.getElementsByTagName("customer")[0]?.textContent}<br>
                Crab: ${o.getElementsByTagName("crab")[0]?.textContent}<br>
                Quantity: ${o.getElementsByTagName("quantity")[0]?.textContent}<br>
                Total: ₱${o.getElementsByTagName("total")[0]?.textContent}<br>
                Status: ${o.getElementsByTagName("status")[0]?.textContent}
            `;

            list.appendChild(li);
        }
    });
}

// =====================
// BACK BUTTON
// =====================
function goBack() {
    window.location.href = "/";
}

// =====================
window.onload = loadHistory;

</script>

</body>
</html>
