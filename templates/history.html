<!DOCTYPE html>
<html>
<head>
    <title>Customer Orders</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='history.css') }}">
</head>
<body>

<div class="container">
    <h1>Customer Orders</h1>

    <div class="form-center">
        <button onclick="goBack()">⬅ Back to Dashboard</button>
    </div>

    <table class="history-table">
        <thead>
            <tr>
                <th>Order #</th>
                <th>Customer</th>
                <th>Crab</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Total</th>
                <th>Time</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody id="historyTableBody"></tbody>
    </table>
</div>

<script>
function loadHistory() {
    fetch('/orders')   // ✅ FIXED (use /orders instead of /history)
    .then(res => {
        if (!res.ok) throw new Error("Failed to fetch orders");
        return res.json();
    })
    .then(data => {
        const items = data.orders || [];
        const tableBody = document.getElementById('historyTableBody');

        if (items.length === 0) {
            tableBody.innerHTML = `<tr><td colspan="8">No orders found</td></tr>`;
            return;
        }

        items.sort((a, b) => b.id - a.id);

        tableBody.innerHTML = items.map(o => `
            <tr>
                <td>#${o.id}</td>
                <td>${o.customer}</td>
                <td>${o.crab}</td>
                <td>${o.quantity}</td>
                <td>₱${o.price}</td>
                <td>₱${o.total}</td>
                <td>${o.timestamp || 'N/A'}</td>
                <td>${o.status.toUpperCase()}</td>
            </tr>
        `).join('');
    })
    .catch(err => {
        alert('Error loading orders: ' + err.message);
    });
}

function goBack() {
    window.location.href = '/admin-dashboard';
}

window.onload = loadHistory;
</script>

</body>
</html>
