<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Page - Crab Orders</title>

<style>
/* =====================
   GLOBAL
===================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    min-height: 100vh;
}

/* =====================
   CONTAINER
===================== */
.container {
    max-width: 900px;
    margin: auto;
    padding: 20px;
    text-align: center;
}

h1, h2 {
    margin-bottom: 15px;
}

/* =====================
   CRAB LIST
===================== */
#crabTypes {
    list-style: none;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
    margin-bottom: 30px;
}

#crabTypes li {
    background: #1e293b;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

#crabTypes li:hover {
    background: #273449;
    transform: scale(1.03);
}

#crabTypes img {
    width: 100%;
    height: 90px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 8px;
}

/* =====================
   FORM
===================== */
.form-center {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: center;
    margin-bottom: 20px;
}

.form-center input {
    width: 280px;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #334155;
    background: #0f172a;
    color: white;
    outline: none;
}

.form-center input:focus {
    border-color: #3b82f6;
}

/* =====================
   BUTTONS
===================== */
button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #2563eb;
}

.admin-btn {
    background: #f59e0b;
}

.admin-btn:hover {
    background: #d97706;
}

/* =====================
   INPUT SPECIAL
===================== */
#crab {
    background: #111827;
}

/* =====================
   LAYOUT CARD EFFECT
===================== */
.container {
    background: rgba(30, 41, 59, 0.4);
    margin-top: 20px;
    border-radius: 14px;
    padding: 25px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}
</style>

</head>

<body>

<div class="container">
    <h2>Available Crabs</h2>
    <ul id="crabTypes"></ul>
</div>

<div class="container">
    <h1>Crab Orders</h1>

    <div class="form-center">
        <input id="customer" placeholder="Customer Name">
        <input id="crab" placeholder="Select Crab (click above)">
        <input id="quantity" type="number" min="1" value="1" placeholder="Quantity">
        <button onclick="addOrder()">Add Order</button>
    </div>

    <div class="form-center">
        <button onclick="goToLogin()" class="admin-btn">Login</button>
    </div>
</div>

<script>
const crabTypes = [
    { name: "King Crab", price: 10, img: "/static/images/kingcrab.jpg" },
    { name: "Snow Crab", price: 9, img: "/static/images/snowcrab.jpg" },
    { name: "Dungeness Crab", price: 8, img: "/static/images/dungenesscrab.jpg" },
    { name: "Blue Crab", price: 7, img: "/static/images/bluecrab.jpg" },
    { name: "Mud Crab", price: 6, img: "/static/images/mudcrab.jpg" },
    { name: "Kasag", price: 5, img: "/static/images/kasagcrab.jpg" }
];

function loadCrabTypes() {
    const list = document.getElementById("crabTypes");
    list.innerHTML = "";

    crabTypes.forEach(crab => {
        const li = document.createElement("li");

        li.innerHTML = `
            <img src="${crab.img}" alt="${crab.name}">
            <div>
                <strong>${crab.name}</strong><br>
                ₱${crab.price}
            </div>
        `;

        li.onclick = () => {
            document.getElementById("crab").value = crab.name;
        };

        list.appendChild(li);
    });
}

function addOrder() {
    const customer = document.getElementById("customer").value.trim();
    const crab = document.getElementById("crab").value.trim();
    const quantity = parseInt(document.getElementById("quantity").value);

    if (!customer || !crab || !quantity) {
        alert("Please fill all fields");
        return;
    }

    fetch('/orders', {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ customer, crab, quantity })
    })
    .then(res => res.json())
    .then(data => {
        alert(data.message || "Order added successfully");

        document.getElementById("customer").value = "";
        document.getElementById("crab").value = "";
        document.getElementById("quantity").value = 1;
    })
    .catch(err => alert("Error: " + err.message));
}

function goToLogin() {
    window.location.href = "/login";
}

window.onload = loadCrabTypes;
</script>

</body>
</html>
