<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: #0f172a;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* container */
.container {
    text-align: center;
}

/* title */
h1 {
    font-size: 36px;
    margin-bottom: 15px;
}

/* subtitle */
p {
    color: #94a3b8;
    margin-bottom: 30px;
}

/* buttons */
.button-group {
    display: flex;
    justify-content: center;
    gap: 15px;
}

button {
    padding: 12px 20px;
    border: none;
    border-radius: 10px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

button:hover {
    background: #2563eb;
}
</style>
</head>

<body>

<div class="container">
    <h1>🦀 Welcome to Crab Ordering System</h1>
    <p>Order fresh crabs easily or manage your account.</p>

    <div class="button-group">
        <button onclick="goToOrder()">🛒 Order Page</button>
        <button onclick="goToLogin()">🔐 Login</button>
    </div>
</div>

<script>
function goToOrder() {
    window.location.href = '/order_page.html';
}

function goToLogin() {
    window.location.href = '/admin_login.html';
}
</script>

</body>
</html>
