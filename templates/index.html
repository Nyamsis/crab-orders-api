<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crab Orders</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
    <h1>Welcome to Crab Orders</h1>

    <div class="form-center">
        <!-- JS version -->
        <button onclick="goToOrder()">Go to Order Page</button>
        <button onclick="goToLogin()" class="admin-btn">Admin Login</button>

        <!-- Fallback (no JS) -->
        <noscript>
            <br><br>
            <a href="/order"><button>Go to Order Page</button></a>
            <a href="/login"><button class="admin-btn">Admin Login</button></a>
        </noscript>
    </div>
</div>

<script>
function goToOrder() {
    window.location.href = "/order";
}

function goToLogin() {
    window.location.href = "/login";
}
</script>

</body>
</html>
