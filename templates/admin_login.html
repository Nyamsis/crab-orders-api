<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Crab Orders</title>

<style>
/* =====================
   GLOBAL
===================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f172a, #1e293b);
}

/* =====================
   LOGIN CARD
===================== */
.login-container {
    background: #1e293b;
    padding: 40px 30px;
    border-radius: 14px;
    width: 340px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    color: white;
    animation: fadeIn 0.5s ease-in-out;
}

.login-container h2 {
    margin-bottom: 20px;
    font-size: 24px;
}

/* =====================
   INPUTS
===================== */
.login-form input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: 1px solid #334155;
    border-radius: 8px;
    background: #0f172a;
    color: white;
    outline: none;
    transition: 0.3s;
}

.login-form input:focus {
    border-color: #3b82f6;
}

/* =====================
   BUTTON
===================== */
.login-btn {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

.login-btn:hover {
    background: #2563eb;
}

/* =====================
   ERROR
===================== */
.error-message {
    display: none;
    background: rgba(239, 68, 68, 0.2);
    color: #fca5a5;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
    font-size: 13px;
}

/* =====================
   BACK LINK
===================== */
.back-link {
    display: block;
    margin-top: 15px;
    color: #94a3b8;
    text-decoration: none;
    font-size: 13px;
}

.back-link:hover {
    color: white;
}

/* =====================
   ANIMATION
===================== */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

</head>
<body>

<div class="login-container">
    <h2>Admin Access</h2>

    <div id="errorMessage" class="error-message"></div>

    <div class="login-form">
        <input id="username" type="text" placeholder="Username" required>
        <input id="password" type="password" placeholder="Password" required>
        <button onclick="login()" class="login-btn">Sign In</button>
    </div>

    <a href="/" class="back-link">← Back to Crab Orders</a>
</div>

<script>
function login() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const errorBox = document.getElementById("errorMessage");

    errorBox.style.display = "none";

    if (!username || !password) {
        errorBox.innerText = "Please fill all fields";
        errorBox.style.display = "block";
        return;
    }

    fetch('/login', {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
    })
    .then(async res => {
        const data = await res.json();

        if (!res.ok) {
            throw new Error(data.error || "Login failed");
        }

        return data;
    })
    .then(() => {
        window.location.href = "/admin-dashboard";
    })
    .catch(err => {
        errorBox.innerText = err.message;
        errorBox.style.display = "block";
    });
}
</script>

</body>
</html>
