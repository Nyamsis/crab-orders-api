<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Customer Order Management</title>

<style>
/* =====================
   GLOBAL
===================== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;
    min-height: 100vh;
}

/* =====================
   CONTAINER
===================== */
.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
}

/* =====================
   BACK BUTTON
===================== */
.form-center {
    display: flex;
    justify-content: center;
    margin-bottom: 15px;
}

.small-button {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    background: #3b82f6;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.small-button:hover {
    background: #2563eb;
}

/* =====================
   TABLE
===================== */
.customer-table {
    width: 100%;
    border-collapse: collapse;
    background: #1e293b;
    border-radius: 12px;
    overflow: hidden;
}

.customer-table th,
.customer-table td {
    padding: 12px;
    text-align: center;
    border-bottom: 1px solid #334155;
}

.customer-table th {
    background: #0f172a;
    color: #94a3b8;
}

.customer-table tr:hover {
    background: #273449;
}

/* =====================
   STATUS BADGE
===================== */
.status-badge {
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
    background: #334155;
}

/* =====================
   ACTION BUTTONS
===================== */
.actions {
    display: flex;
    gap: 5px;
    justify-content: center;
}

button {
    border: none;
    padding: 6px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    transition: 0.3s;
}

.btn-edit {
    background: #f59e0b;
    color: white;
}

.btn-complete {
    background: #22c55e;
    color: white;
}

.btn-delete {
    background: #ef4444;
    color: white;
}

button:hover {
    opacity: 0.8;
}

/* =====================
   STATUS COLORS (optional highlight)
===================== */
.status-pending {
    border-left: 4px solid #f59e0b;
}

.status-finished {
    border-left: 4px solid #22c55e;
}
</style>

</head>

<body>

<div class="container">
    <h1>Customer Order Management</h1>

    <div class="form-center">
        <button class="small-button" onclick="goBack()">⬅ Back to Dashboard</button>
    </div>

    <table class="customer-table">
        <thead>
            <tr>
                <th>Order #</th>
                <th>Customer</th>
                <th>Crab</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Total</th>
                <th>Time</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="customerOrderBody"></tbody>
    </table>
</div>

<script>
function loadCustomerOrders() {
    fetch('/orders')
    .then(res => {
        if (!res.ok) throw new Error('Failed to load orders');
        return res.json();
    })
    .then(data => {
        const items = data.orders || [];
        const body = document.getElementById('customerOrderBody');

        if (items.length === 0) {
            body.innerHTML = '<tr><td colspan="9" style="text-align:center;">No orders available</td></tr>';
            return;
        }

        items.sort((a, b) => b.id - a.id);

        body.innerHTML = items.map(o => `
            <tr class="status-${o.status}">
                <td>#${o.id}</td>
                <td>${o.customer}</td>
                <td>${o.crab}</td>
                <td>${o.quantity}</td>
                <td>₱${o.price}</td>
                <td>₱${o.total}</td>
                <td>${o.timestamp || 'N/A'}</td>
                <td><span class="status-badge">${o.status.toUpperCase()}</span></td>
                <td class="actions">
                    <button class="btn-edit" onclick="editOrder(${o.id})">Edit</button>
                    <button class="btn-complete" onclick="completeOrder(${o.id})">Complete</button>
                    <button class="btn-delete" onclick="deleteOrder(${o.id})">Delete</button>
                </td>
            </tr>
        `).join('');
    })
    .catch(err => alert('Error: ' + err.message));
}

function editOrder(id) {
    const customer = prompt('Customer name:');
    if (customer === null) return;

    const crab = prompt('Crab type:');
    if (crab === null) return;

    const quantity = prompt('Quantity:');
    if (quantity === null) return;

    fetch(`/orders/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            customer: customer.trim(),
            crab: crab.trim(),
            quantity: parseInt(quantity, 10)
        })
    })
    .then(res => {
        if (!res.ok) throw new Error('Update failed');
        return res.json();
    })
    .then(() => loadCustomerOrders())
    .catch(err => alert(err.message));
}

function completeOrder(id) {
    fetch(`/orders/${id}/finish`, { method: 'PUT' })
    .then(res => {
        if (!res.ok) throw new Error('Complete failed');
        return res.json();
    })
    .then(() => loadCustomerOrders())
    .catch(err => alert(err.message));
}

function deleteOrder(id) {
    if (!confirm('Delete this order?')) return;

    fetch(`/orders/${id}`, { method: 'DELETE' })
    .then(res => {
        if (!res.ok) throw new Error('Delete failed');
        return res.json();
    })
    .then(() => loadCustomerOrders())
    .catch(err => alert(err.message));
}

function goBack() {
    window.location.href = '/admin-dashboard';
}

window.onload = loadCustomerOrders;
</script>

</body>
</html>
